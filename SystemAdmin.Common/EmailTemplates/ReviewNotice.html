<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="zh-CN" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>待审批通知 / Pending Review</title>
    <!--[if mso]>
    <style type="text/css">
        body, table, td, a { font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif !important; }
    </style>
    <![endif]-->
    <style type="text/css">
        @media only screen and (max-width: 480px) {
            .ep-container {
                padding: 6px 6px !important;
            }

            .ep-section {
                padding-left: 18px !important;
                padding-right: 18px !important;
            }

            .ep-label {
                display: block !important;
                width: auto !important;
                padding-bottom: 2px !important;
            }

            .ep-value {
                display: block !important;
                padding-top: 0 !important;
                padding-bottom: 12px !important;
            }

            .ep-btn {
                padding: 9px 14px !important;
                font-size: 13px !important;
            }

            .ep-btn-gap {
                width: 8px !important;
            }

            .ep-btn-row {
                padding-bottom: 10px !important;
            }
        }
    </style>
</head>
<body style="margin:0;padding:0;background-color:#f5f7fa;font-family:'Microsoft YaHei','微软雅黑',-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;color:#303133;-webkit-font-smoothing:antialiased;">
    <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#f5f7fa;">
        <tr>
            <td align="center" class="ep-container" style="padding:10px 8px;">
                <table role="presentation" width="560" border="0" cellspacing="0" cellpadding="0" style="max-width:560px;width:100%;background-color:#ffffff;border-radius:4px;">

                    <!-- Header -->
                    <tr>
                        <td class="ep-section" style="padding:24px 32px 8px 32px;">
                            <div style="font-size:18px;font-weight:500;color:#303133;line-height:1.4;">待审批通知</div>
                            <div style="font-size:13px;color:#909399;margin-top:4px;">Pending Review</div>
                        </td>
                    </tr>

                    <!-- Greeting -->
                    <tr>
                        <td class="ep-section" style="padding:12px 32px 4px 32px;font-size:14px;color:#303133;line-height:1.6;">
                            {{Greeting}}
                        </td>
                    </tr>

                    <!-- Form Info -->
                    <tr>
                        <td class="ep-section" style="padding:4px 32px 8px 32px;">
                            <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td class="ep-label" width="120" style="color:#909399;font-size:13px;padding:8px 0;vertical-align:top;">单号 / No.</td>
                                    <td class="ep-value" style="color:#303133;font-size:14px;padding:8px 0;line-height:1.5;">{{FormNo}}</td>
                                </tr>
                                <tr>
                                    <td class="ep-label" style="color:#909399;font-size:13px;padding:8px 0;vertical-align:top;">表单类型 / Type</td>
                                    <td class="ep-value" style="color:#303133;font-size:14px;padding:8px 0;line-height:1.5;">
                                        {{FormTypeNameCn}} <span style="color:#c0c4cc;">/ {{FormTypeNameEn}}</span>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="ep-label" style="color:#909399;font-size:13px;padding:8px 0;vertical-align:top;">当前步骤 / Step</td>
                                    <td class="ep-value" style="color:#303133;font-size:14px;padding:8px 0;line-height:1.5;">
                                        {{CurrentStepNameCn}} <span style="color:#c0c4cc;">/ {{CurrentStepNameEn}}</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Action Buttons (table 间距 + Outlook VML 兼容) -->
                    <tr>
                        <td class="ep-section ep-btn-row" style="padding:8px 32px 4px 32px;">
                            <table role="presentation" border="0" cellspacing="0" cellpadding="0" style="border-collapse:separate;">
                                <tr>
                                    <!-- 前往审批（主按钮） -->
                                    <td class="ep-btn-stack" align="center" valign="middle" style="border-radius:4px;">
                                        <!--[if mso]>
                                        <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{ReviewUrl}}" style="height:36px;v-text-anchor:middle;width:150px;" arcsize="12%" stroke="f" fillcolor="#409eff">
                                            <w:anchorlock/>
                                            <center style="color:#ffffff;font-family:'Microsoft YaHei',sans-serif;font-size:14px;">前往审批 / Review</center>
                                        </v:roundrect>
                                        <![endif]-->
                                        <!--[if !mso]><!-->
                                        <a href="{{ReviewUrl}}" class="ep-btn"
                                           style="display:inline-block;background-color:#409eff;color:#ffffff;text-decoration:none;font-size:14px;line-height:1;padding:10px 20px;border-radius:4px;border:1px solid #409eff;">
                                            前往审批 / Review
                                        </a>
                                        <!--<![endif]-->
                                    </td>

                                    <!-- 间距 -->
                                    <td class="ep-btn-gap" width="12" style="font-size:0;line-height:0;">&nbsp;</td>

                                    <!-- 登入系统（次按钮） -->
                                    <td class="ep-btn-stack" align="center" valign="middle" style="border-radius:4px;">
                                        <!--[if mso]>
                        <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{LoginUrl}}" style="height:36px;v-text-anchor:middle;width:150px;" arcsize="12%" strokecolor="#409eff" fillcolor="#ffffff">
                            <w:anchorlock/>
                            <center style="color:#409eff;font-family:'Microsoft YaHei',sans-serif;font-size:14px;">登入系统 / Sign In</center>
                        </v:roundrect>
                        <![endif]-->
                                        <!--[if !mso]><!-->
                                        <a href="{{LoginUrl}}" class="ep-btn"
                                           style="display:inline-block;background-color:#ffffff;color:#409eff;text-decoration:none;font-size:14px;line-height:1;padding:10px 20px;border:1px solid #409eff;border-radius:4px;">
                                            登入系统 / Sign In
                                        </a>
                                        <!--<![endif]-->
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Expiration -->
                    <tr>
                        <td class="ep-section" style="padding:10px 32px 24px 32px;color:#e6a23c;font-size:12px;line-height:1.6;">
                            审批链接 15 天内有效 / Link expires in 15 days
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td class="ep-section" style="padding:16px 32px;color:#c0c4cc;font-size:12px;line-height:1.6;background-color:#fafafa;border-radius:0 0 4px 4px;">
                            系统自动发送，请勿回复 / Automated message, do not reply
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
