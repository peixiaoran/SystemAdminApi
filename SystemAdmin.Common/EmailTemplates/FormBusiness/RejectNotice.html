<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="zh-CN" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{Title}}</title>

    <!--[if mso]>
    <style type="text/css">
        body, table, td, a {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif !important;
        }
    </style>
    <![endif]-->

    <style type="text/css">
        @media only screen and (max-width: 480px) {
            .ep-page {
                padding: 10px 8px !important;
            }

            .ep-card {
                width: 100% !important;
                border-radius: 8px !important;
            }

            .ep-section {
                padding-left: 20px !important;
                padding-right: 20px !important;
            }

            .ep-title {
                font-size: 18px !important;
            }

            /* label 与 value 保持在同一行 */
            .ep-info-label {
                display: table-cell !important;
                width: 80px !important;
                padding: 9px 0 !important;
                text-align: left !important;
                vertical-align: top !important;
            }

            .ep-info-value {
                display: table-cell !important;
                padding: 9px 0 !important;
                vertical-align: top !important;
            }

            /* 按钮：高度降低，并保留中间间距 */
            .ep-btn {
                display: inline-block !important;
                padding-top: 8px !important;
                padding-bottom: 8px !important;
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .ep-btn-gap {
                display: table-cell !important;
                width: 14px !important;
                font-size: 0 !important;
                line-height: 0 !important;
            }
        }
    </style>
</head>

<body style="margin:0;padding:0;background-color:#f5f7fa;font-family:'Microsoft YaHei','微软雅黑',-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;color:#303133;-webkit-font-smoothing:antialiased;">

    <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#f5f7fa;">
        <tr>
            <td align="left" class="ep-page" style="padding:10px 12px;">

                <!-- Main Card -->
                <table role="presentation" width="640" border="0" cellspacing="0" cellpadding="0" align="left" class="ep-card" style="width:640px;max-width:640px;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #ebeef5;box-shadow:0 4px 18px rgba(0,0,0,0.04);">

                    <!-- Top Blue Bar -->
                    <tr>
                        <td style="height:5px;background-color:#409eff;font-size:0;line-height:0;">&nbsp;</td>
                    </tr>

                    <!-- Header -->
                    <tr>
                        <td class="ep-section" style="padding:30px 36px 18px 36px;">
                            <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td valign="top">
                                        <div class="ep-title" style="font-size:21px;font-weight:600;color:#303133;line-height:1.45;">
                                            {{Title}}
                                        </div>
                                        <div style="margin-top:8px;font-size:13px;color:#909399;line-height:1.6;">
                                            {{Greeting}}
                                        </div>
                                    </td>
                                    <td align="right" valign="top" style="width:110px;">
                                        <table role="presentation" border="0" cellspacing="0" cellpadding="0" style="display: inline-table; border-collapse: separate; background-color: #fef0f0; border: 1px solid #fde2e2; border-radius: 999px; ">
                                            <tr>
                                                <td style="padding: 5px 13px; font-size: 12px; line-height: 1.4; color: #f56c6c; font-weight: 500; white-space: nowrap;">
                                                    {{ResultText}}
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Highlight Summary -->
                    <tr>
                        <td class="ep-section" style="padding:0 36px 18px 36px;">
                            <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#ecf5ff;border:1px solid #d9ecff;border-radius:8px;">
                                <tr>
                                    <td style="padding:16px 18px;">
                                        <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0">
                                            <tr>
                                                <td style="font-size:13px;color:#909399;line-height:1.6;padding-bottom:4px;">
                                                    {{LabelStep}}
                                                </td>
                                            </tr>
                                            <tr>
                                                <td style="font-size:16px;color:#303133;font-weight:600;line-height:1.6;">
                                                    {{CurrentStepName}}
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Form Info Card -->
                    <tr>
                        <td class="ep-section" style="padding:0 36px 20px 36px;">
                            <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="border:1px solid #ebeef5;border-radius:8px;overflow:hidden;">
                                <tr>
                                    <td style="padding:18px 20px;background-color:#ffffff;">

                                        <div style="font-size:15px;font-weight:600;color:#303133;line-height:1.5;margin-bottom:12px;">
                                            {{FormInfo}}
                                        </div>

                                        <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0">

                                            <tr>
                                                <td class="ep-info-label" width="120" style="width:120px;color:#909399;font-size:13px;padding:9px 0;vertical-align:top;text-align:left;">
                                                    {{LabelFormNo}}
                                                </td>
                                                <td class="ep-info-value" style="color:#303133;font-size:14px;padding:9px 0;line-height:1.6;word-break:break-word;">
                                                    {{FormNo}}
                                                </td>
                                            </tr>

                                            <tr>
                                                <td colspan="2" style="height:1px;background-color:#f2f6fc;font-size:0;line-height:0;">&nbsp;</td>
                                            </tr>

                                            <tr>
                                                <td class="ep-info-label" width="120" style="width:120px;color:#909399;font-size:13px;padding:9px 0;vertical-align:top;text-align:left;">
                                                    {{LabelFormType}}
                                                </td>
                                                <td class="ep-info-value" style="color:#303133;font-size:14px;padding:9px 0;line-height:1.6;word-break:break-word;">
                                                    {{FormTypeName}}
                                                </td>
                                            </tr>

                                            <tr>
                                                <td colspan="2" style="height:1px;background-color:#f2f6fc;font-size:0;line-height:0;">&nbsp;</td>
                                            </tr>

                                            <tr>
                                                <td class="ep-info-label" width="120" style="width:120px;color:#909399;font-size:13px;padding:9px 0;vertical-align:top;text-align:left;">
                                                    {{LabelApplicant}}
                                                </td>
                                                <td class="ep-info-value" style="color:#303133;font-size:14px;padding:9px 0;line-height:1.6;word-break:break-word;">
                                                    {{ApplicantUser}}
                                                </td>
                                            </tr>

                                            <tr>
                                                <td colspan="2" style="height:1px;background-color:#f2f6fc;font-size:0;line-height:0;">&nbsp;</td>
                                            </tr>

                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Comment Block -->
                    <tr>
                        <td class="ep-section" style="padding:0 36px 22px 36px;">
                            <table role="presentation" width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color:#fafafa;border:1px solid #ebeef5;border-radius:8px;">
                                <tr>
                                    <td style="padding:16px 18px;">
                                        <div style="font-size:13px;color:#909399;line-height:1.6;margin-bottom:6px;">
                                            {{LabelComment}}
                                        </div>
                                        <div style="font-size:14px;color:#303133;line-height:1.8;word-break:break-word;">
                                            {{Comment}}
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Buttons -->
                    <tr>
                        <td class="ep-section" style="padding:0 36px 12px 36px;">
                            <table role="presentation" border="0" cellspacing="0" cellpadding="0" align="left" class="ep-btn-table">
                                <tr>
                                    <td align="center" valign="middle">

                                        <!--[if mso]>
                            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word"
                                href="{{ReviewUrl}}"
                                style="height:36px;v-text-anchor:middle;width:150px;"
                                arcsize="12%" stroke="f" fillcolor="#409eff">
                                <w:anchorlock/>
                                <center style="color:#ffffff;font-family:'Microsoft YaHei',sans-serif;font-size:14px;font-weight:500;">
                                    {{BtnReview}}
                                </center>
                            </v:roundrect>
                            <![endif]-->
                                        <!--[if !mso]><!-->
                                        <a href="{{ReviewUrl}}" class="ep-btn"
                                           style="display:inline-block;background-color:#409eff;color:#ffffff;text-decoration:none;font-size:14px;line-height:1;padding:10px 22px;border-radius:6px;border:1px solid #409eff;font-weight:500;">
                                            {{BtnReview}}
                                        </a>
                                        <!--<![endif]-->

                                    </td>

                                    <!-- 按钮间距：手机版 QQ 邮箱里会更明显一些 -->
                                    <td class="ep-btn-gap" width="16" style="width:16px;font-size:0;line-height:0;">&nbsp;</td>

                                    <td align="center" valign="middle">

                                        <!--[if mso]>
                            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word"
                                href="{{LoginUrl}}"
                                style="height:36px;v-text-anchor:middle;width:150px;"
                                arcsize="12%" strokecolor="#dcdfe6" fillcolor="#ffffff">
                                <w:anchorlock/>
                                <center style="color:#606266;font-family:'Microsoft YaHei',sans-serif;font-size:14px;font-weight:500;">
                                    {{BtnSignIn}}
                                </center>
                            </v:roundrect>
                            <![endif]-->
                                        <!--[if !mso]><!-->
                                        <a href="{{LoginUrl}}" class="ep-btn"
                                           style="display:inline-block;background-color:#ffffff;color:#606266;text-decoration:none;font-size:14px;line-height:1;padding:10px 22px;border-radius:6px;border:1px solid #dcdfe6;font-weight:500;">
                                            {{BtnSignIn}}
                                        </a>
                                        <!--<![endif]-->

                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Expire Hint -->
                    <tr>
                        <td class="ep-section" style="padding:4px 36px 28px 36px;color:#e6a23c;font-size:12px;line-height:1.7;">
                            {{ExpireHint}}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td class="ep-section" style="padding:18px 36px;background-color:#fafafa;border-top:1px solid #ebeef5;">
                            <div style="font-size:12px;color:#c0c4cc;line-height:1.7;">
                                {{FooterText}}
                            </div>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
